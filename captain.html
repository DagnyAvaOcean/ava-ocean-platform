<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captain's Log</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Captain's Log</h1>
    <nav>
      <ul>
        <li><a href="#gps-input">GPS Input</a></li>
        <li><a href="#harvest-logging">Harvest Logging</a></li>
        <li><a href="#bycatch-registration">Bycatch Registration</a></li>
        <li><a href="#activity-logging">Activity Logging</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="gps-input">
      <h2>GPS Input</h2>
      <form>
        <div class="form-group">
          <label for="gps-input-mode">GPS Input Mode:</label>
          <select id="gps-input-mode" class="form-control">
            <option value="automatic">Automatic</option>
            <option value="manual">Manual</option>
          </select>
        </div>
        <div class="form-group" id="manual-gps-inputs" style="display: none;">
          <label for="latitude">Latitude:</label>
          <input type="text" id="latitude" class="form-control" placeholder="Enter latitude">
          <label for="longitude">Longitude:</label>
          <input type="text" id="longitude" class="form-control" placeholder="Enter longitude">
        </div>
      </form>
    </section>

    <section id="harvest-logging">
      <h2>Harvest Logging</h2>
      <form>
        <div class="form-group">
          <label for="species">Species:</label>
          <input type="text" id="species" class="form-control" placeholder="Enter species">
        </div>
        <div class="form-group">
          <label for="quantity">Quantity:</label>
          <input type="number" id="quantity" class="form-control" placeholder="Enter quantity">
        </div>
        <button type="button" class="btn btn-primary" id="save-harvest">Save Harvest</button>
      </form>
    </section>

    <section id="bycatch-registration">
      <h2>Bycatch Registration</h2>
      <form>
        <div class="form-group">
          <label for="bycatch-species">Species:</label>
          <input type="text" id="bycatch-species" class="form-control" placeholder="Enter species">
        </div>
        <div class="form-group">
          <label for="bycatch-quantity">Quantity:</label>
          <input type="number" id="bycatch-quantity" class="form-control" placeholder="Enter quantity">
        </div>
        <button type="button" class="btn btn-primary" id="save-bycatch">Save Bycatch</button>
      </form>
    </section>

    <section id="activity-logging">
      <h2>Activity Logging</h2>
      <form>
        <div class="form-group">
          <label for="activity-type">Activity Type:</label>
          <select id="activity-type" class="form-control">
            <option value="wow">Waiting on Weather</option>
            <option value="downtime">Downtime</option>
          </select>
        </div>
        <div class="form-group">
          <label for="activity-details">Details:</label>
          <textarea id="activity-details" class="form-control" placeholder="Enter activity details"></textarea>
        </div>
        <button type="button" class="btn btn-primary" id="save-activity">Save Activity</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2023 Ava Ocean. All rights reserved.</p>
  </footer>

  <script src="js/captain.js"></script>
</body>
</html>
