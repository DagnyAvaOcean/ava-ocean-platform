:root {
  --deep:#2C262E;--ocean:#332D35;--panel:#433A46;--border:#5c5060;
  --accent:#D9FFAC;--scallop:#E6D2C5;--warn:#FF8C69;--text:#F0EAE6;--muted:#a8959e;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--deep);color:var(--text);font-family:'ProtoGrotesk',sans-serif;font-weight:300;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
.logo{height:48px;display:block;margin-bottom:10px;}
.tagline{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'ABCFavorit',sans-serif;margin-bottom:12px;text-align:center;}
.lang-toggle{display:flex;gap:6px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:20px;padding:3px;margin-bottom:44px;}
.lang-btn{padding:5px 16px;border-radius:16px;border:none;font-family:'ABCFavorit',sans-serif;font-weight:700;font-size:12px;cursor:pointer;background:transparent;color:var(--muted);transition:all 0.15s;}
.lang-btn.active{background:var(--accent);color:var(--deep);}
.cards{display:grid;grid-template-columns:1fr;gap:16px;width:100%;max-width:400px;}
.role-card{background:var(--panel);border:1.5px solid var(--border);border-radius:16px;padding:24px 22px;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:20px;transition:all 0.2s;}
.role-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.role-card.captain{border-color:rgba(217,255,172,0.3);}
.role-card.factory{border-color:rgba(230,210,197,0.3);}
.role-card.dashboard{border-color:rgba(255,140,105,0.2);}
.role-card:hover.captain{border-color:var(--accent);background:rgba(217,255,172,0.06);}
.role-card:hover.factory{border-color:var(--scallop);background:rgba(230,210,197,0.06);}
.role-card:hover.dashboard{border-color:var(--warn);background:rgba(255,140,105,0.06);}
.role-icon{font-size:36px;width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.captain .role-icon{background:rgba(217,255,172,0.08);}
.factory .role-icon{background:rgba(230,210,197,0.08);}
.dashboard .role-icon{background:rgba(255,140,105,0.08);}
.role-text{flex:1;}
.role-title{font-family:'ABCFavorit',sans-serif;font-weight:700;font-size:17px;margin-bottom:5px;}
.captain .role-title{color:var(--accent);}
.factory .role-title{color:var(--scallop);}
.dashboard .role-title{color:var(--warn);}
.role-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.role-arrow{font-size:20px;color:var(--muted);flex-shrink:0;transition:transform 0.2s;}
.role-card:hover .role-arrow{transform:translateX(4px);color:var(--text);}
.footer{margin-top:48px;font-size:11px;color:var(--muted);text-align:center;font-family:'ABCFavorit',sans-serif;letter-spacing:0.5px;}
@media(min-width:640px){.cards{max-width:480px;}.role-card{padding:28px 26px;}}
</style>
</head>
<body>
  <img class="logo" src="ava-ocean-logo-mark-lime-purple-master.png">
  <div class="tagline" id="tagline">Forskningsplattform</div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('no')">NO</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>
  <div class="cards">
    <a class="role-card captain" href="captain.html">
      <div class="role-icon">🚢</div>
      <div class="role-text">
        <div class="role-title" id="titleCaptain">Kaptein</div>
        <div class="role-desc" id="descCaptain">Logg høstaktiviteter, GPS-posisjoner, drivstoff og bifangst fra dekk</div>
      </div>
      <div class="role-arrow">→</div>
    </a>
    <a class="role-card factory" href="factory.html">
      <div class="role-icon">⚖️</div>
      <div class="role-text">
        <div class="role-title" id="titleFactory">Fabrikk</div>
        <div class="role-desc" id="descFactory">Registrer skiftprøver — muskelutbytte, rogntelling og kvalitetsdata</div>
      </div>
      <div class="role-arrow">→</div>
    </a>
    <a class="role-card dashboard" href="dashboard.html">
      <div class="role-icon">📊</div>
      <div class="role-text">
        <div class="role-title" id="titleDash">Dashboard</div>
        <div class="role-desc" id="descDash">Forskningsoversikt — CPUE, utslipp, bifangst og høstkart</div>
      </div>
      <div class="role-arrow">→</div>
    </a>
  </div>
  <div class="footer" id="footer">Ava Ocean · Kun intern bruk</div>

<script>
const strings = {
  no: {
    tagline: 'Forskningsplattform',
    titleCaptain: 'Kaptein', descCaptain: 'Logg høstaktiviteter, GPS-posisjoner, drivstoff og bifangst fra dekk',
    titleFactory: 'Fabrikk', descFactory: 'Registrer skiftprøver — muskelutbytte, rogntelling og kvalitetsdata',
    titleDash: 'Dashboard', descDash: 'Forskningsoversikt — CPUE, utslipp, bifangst og høstkart',
    footer: 'Ava Ocean · Kun intern bruk',
  },
  en: {
    tagline: 'Research Platform',
    titleCaptain: 'Captain', descCaptain: 'Log harvest activities, GPS positions, fuel and bycatch from the deck',
    titleFactory: 'Factory', descFactory: 'Record shift samples — muscle yield, roe counts and quality data',
    titleDash: 'Dashboard', descDash: 'Research overview — CPUE, emissions, bycatch and harvest map',
    footer: 'Ava Ocean · Internal use only',
  }
};
function setLang(lang) {
  localStorage.setItem('ava_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
  const s = strings[lang];
  Object.keys(s).forEach(id => { const el = document.getElementById(id); if(el) el.textContent = s[id]; });
}
const saved = localStorage.getItem('ava_lang') || 'no';
if (saved !== 'no') setLang(saved);
</script>
</body>
</html>
